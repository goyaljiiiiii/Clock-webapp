name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the issue clearly.
      placeholder: The timer resets when...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps.
      placeholder: |
        1. Open index.html
        2. Set timer to 01:00
        3. Click Start
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: Chrome 121 / Firefox 122 / Safari 17

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11 / Ubuntu 24.04 / macOS 14
